name: CI/CD/CT Pipeline

# 1. 트리거: main 브랜치에 push나 PR이 발생하면 작동
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # job 이름: build-and-test
  build-and-test:
    runs-on: ubuntu-latest # 가상 머신 환경

    steps:
      # 2. 코드 체크아웃 (GitHub에서 코드를 가져옴)
      - uses: actions/checkout@v4

      # 3. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. 의존성 설치 (requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Continuous Testing (CT): pytest 실행
      - name: Run Tests with pytest
        run: |
          pytest

      # 6. Continuous Deployment (CD) - 시뮬레이션
      - name: Deploy to aws k8s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/cicd
            git pull origin main
            sudo kubectl apply -f deploy/deployment.yaml